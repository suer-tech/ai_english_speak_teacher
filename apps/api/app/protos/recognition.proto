syntax = "proto3";

package smartspeech.recognition.v1;

import "task.proto";
import "google/protobuf/duration.proto";

option go_package = "./;protocol";
option java_package = "TODO";

service SmartSpeech {
 rpc Recognize (stream RecognitionRequest) returns (stream RecognitionResponse);
 rpc AsyncRecognize (AsyncRecognizeRequest) returns (smartspeech.task.v1.Task);
}

message RecognitionRequest {
 oneof request {
  RecognitionOptions options = 1;
  bytes audio_chunk = 2;
 }
}

enum EouReason {
 UNSPECIFIED = 0;
 ORGANIC = 1;
 NO_SPEECH_TIMEOUT = 2;
 MAX_SPEECH_TIMEOUT = 3;
}

message RecognitionResponse {
 repeated Hypothesis results = 1;
 bool eou = 2;
 Emotions emotions_result = 3;
 google.protobuf.Duration processed_audio_start = 4;
 google.protobuf.Duration processed_audio_end = 5;
 BackendInfo backend_info = 6;
 int32 channel = 7;
 SpeakerInfo speaker_info = 8;
 EouReason eou_reason = 9;
 string insight = 10;
}

message AsyncRecognizeRequest {
 RecognitionOptions options = 1;
 string request_file_id = 2;
}

message RecognitionOptions {
 enum AudioEncoding {
  AUDIO_ENCODING_UNSPECIFIED = 0;
  PCM_S16LE = 1;
  OPUS = 2;
  MP3 = 3;
  FLAC = 4;
  ALAW = 5;
  MULAW = 6;
 }

 AudioEncoding audio_encoding = 1;
 int32 sample_rate = 2;
 string language = 3;
 string model = 4;
 int32 hypotheses_count = 5;
 Hints hints = 6;
 bool enable_profanity_filter = 7;
 bool enable_multi_utterance = 8;
 bool enable_partial_results = 9;
 google.protobuf.Duration no_speech_timeout = 10;
 google.protobuf.Duration max_speech_timeout = 11;
 int32 channels_count = 12;
 SpeakerSeparationOptions speaker_separation_options = 13;
 repeated string insight_models = 14;
 bool force_cyrillic = 15;
}

message Hints {
 repeated string words = 1;
 bool enable_letters = 2;
 google.protobuf.Duration eou_timeout = 3;
}

message SpeakerSeparationOptions {
 bool enable = 1;
 bool enable_only_main_speaker = 2;
 int32 count = 3;
}

message Hypothesis {
 message WordAlignment {
  string word = 1;
  google.protobuf.Duration start = 2;
  google.protobuf.Duration end = 3;
 }

 string text = 1;
 string normalized_text = 2;
 google.protobuf.Duration start = 3;
 google.protobuf.Duration end = 4;
 repeated WordAlignment word_alignments = 5;
}

message Emotions {
 float positive = 1;
 float neutral = 2;
 float negative = 3;
}

message BackendInfo {
 string model_name = 1;
 string model_version = 2;
 string server_version = 3;
}

message SpeakerInfo {
 int32 speaker_id = 1;
 float main_speaker_confidence = 2;
}
